<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

<body class="bg-[#f8fafc]">

<!-- HEADER -->
<header class="flex items-center justify-between px-5 py-4 bg-white shadow-sm">
  <div class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-6xl mx-auto flex items-center justify-between px-5 py-4">
    <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='index.html'">

      <h1 class="text-lg font-bold tracking-tight"></h1>
    </div>

    <nav class="hidden md:flex gap-8 font-medium items-center text-gray-700">
      <a href="index.html" class="text-blue-600">Home</a>
      <a href="store.html" class="hover:text-blue-500 transition">Store</a>
      <a href="#about" class="hover:text-blue-500 transition">About</a>
      <a href="#faq" class="hover:text-blue-500 transition">FAQ</a>
      
      <a href="mailto:hello@Jump and Splash Inflatable Rentals.com" class="hover:text-blue-500 transition">Contact</a>

      <a href="cart.html" class="flex items-center gap-2 bg-blue-50 px-4 py-2 rounded-full text-blue-600 hover:bg-blue-100 transition">
        <span>🛒</span>
        <span id="cartCount" class="font-bold">0</span>
      </a>
    </nav>

    <button id="openMenu" class="md:hidden text-2xl">☰</button>
  </div>
</div>
</header>

<!-- MAIN -->
<section class="px-5 py-10">

  <div class="max-w-6xl mx-auto grid md:grid-cols-[1fr_350px] gap-10">

    <!-- CART ITEMS -->
    <div>
      <h2 class="heading text-2xl mb-6">Your Booking</h2>
      <div id="cartItems" class="flex flex-col gap-5"></div>
      <a href="store.html" class="inline-block mt-6 text-[#0ea5a4]">+ Add More Items</a>
    </div>

    <!-- FORM -->
    <div class="bg-white rounded-2xl p-6 shadow-sm h-fit">

      <h3 class="font-semibold mb-4">Customer Details</h3>

      <input id="name" placeholder="Full Name" class="w-full p-2 border rounded-lg mb-3">
      <input id="email" placeholder="Email Address" class="w-full p-2 border rounded-lg mb-3">
      <input id="phone" placeholder="Phone Number" class="w-full p-2 border rounded-lg mb-3">
      <input id="address" placeholder="Event Address" class="w-full p-2 border rounded-lg mb-3">

      <label class="text-sm text-gray-600">Event Date</label>
      <input type="date" id="eventDate" class="w-full mt-2 mb-4 p-2 border rounded-lg">

      <div class="flex justify-between mb-3">
        <span>Total</span>
        <span id="totalPrice" class="font-semibold">$0</span>
      </div>

      <!-- EMAIL BUTTON -->
      <button onclick="sendOrder()" 
        class="w-full bg-[#0ea5a4] text-white py-3 rounded-full mb-3">
        Complete Booking (Email)
      </button>

      <!-- WHATSAPP BUTTON 
      <button onclick="sendWhatsApp()" 
        class="w-full bg-green-500 text-white py-3 rounded-full">
        Book via WhatsApp
      </button>
    -->
    </div>

  </div>

</section>

<script>
emailjs.init("HlDY0J7_kCIOuXycZ"); // replace

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let data = {};

fetch('categories.json')
  .then(res => res.json())
  .then(json => {
    data = json;
    renderCart();
  });

function renderCart() {
  const container = document.getElementById("cartItems");
  container.innerHTML = "";

  cart.forEach((item, index) => {
    if (!item.quantity) item.quantity = 1;

    container.innerHTML += `
      <div class="bg-white rounded-2xl p-4 flex gap-4 shadow-sm">
        <img src="${item.image}" class="w-24 h-24 object-cover rounded-lg">

        <div class="flex-1">
          <h3 class="font-semibold text-sm">${item.name}</h3>
          <p class="text-xs text-gray-500">${item.dimensions}</p>

          <p class="text-[#0ea5a4] font-semibold mt-1">
            $${item.price_per_day}/day
          </p>

          <div class="flex items-center gap-3 mt-3">
            <button onclick="changeQty(${index}, -1)" class="px-2 bg-gray-200 rounded">-</button>
            <span>${item.quantity}</span>
            <button onclick="changeQty(${index}, 1)" class="px-2 bg-gray-200 rounded">+</button>
          </div>

          <button onclick="removeItem(${index})" class="text-red-500 text-xs mt-2">
            Remove
          </button>
        </div>
      </div>
    `;
  });

  updateTotal();
}

function changeQty(index, delta) {
  cart[index].quantity += delta;
  if (cart[index].quantity <= 0) cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function removeItem(index) {
  cart.splice(index, 1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function updateTotal() {
  let total = 0;
  cart.forEach(item => total += item.price_per_day * item.quantity);
  document.getElementById("totalPrice").textContent = `$${total}`;
}

function getFormData() {
  return {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value,
    date: document.getElementById("eventDate").value
  };
}

function validate(form) {
  return form.name && form.email && form.phone && form.address && form.date;
}

/* EMAIL */
function sendOrder() {
  const form = getFormData();
  if (!validate(form)) return alert("Fill all fields");

  let orderDetails = "";
  let total = 0;

  cart.forEach(item => {
    orderDetails += `${item.name} x${item.quantity} - $${item.price_per_day}/day\n`;
    total += item.price_per_day * item.quantity;
  });

  emailjs.send("Party Rentals", "template_gukb88p", {
    customer_name: form.name,
    customer_email: form.email,
    phone: form.phone,
    address: form.address,
    event_date: form.date,
    order: orderDetails,
    total: `$${total}`
  }).then(() => {
    alert("Booking sent ✅");
    localStorage.removeItem("cart");
    window.location.href = "index.html";
  });
}

</script>
<script>
  // --- Cart Count Logic ---
  function updateGlobalCartCount() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const count = cart.reduce((total, item) => total + (item.quantity || 1), 0);
    
    const desktopCount = document.getElementById('cartCount');
    const mobileCount = document.getElementById('cartCountMobile');
    
    if (desktopCount) desktopCount.textContent = count;
    if (mobileCount) mobileCount.textContent = count;
  }

  // --- Mobile Menu Logic ---
  const openBtn = document.getElementById('openMenu');
  const closeBtn = document.getElementById('closeMenu');
  const panel = document.getElementById('menuPanel');
  const overlay = document.getElementById('menuOverlay');

  if (openBtn && closeBtn) {
    openBtn.onclick = () => { 
      panel.classList.remove('translate-x-full'); 
      overlay.classList.remove('hidden'); 
    };
    closeBtn.onclick = () => { 
      panel.classList.add('translate-x-full'); 
      overlay.classList.add('hidden'); 
    };
    overlay.onclick = closeBtn.onclick;
  }

  // Initialize on load
  window.addEventListener('DOMContentLoaded', updateGlobalCartCount);
</script>
</body>
</html>
